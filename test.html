<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
}

/* BOTÓN */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  border: none;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 420px;
  height: 560px;
  background: #020617;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* HEADER */
#header {
  padding: 12px;
  color: #22c55e;
  border-bottom: 1px solid #1e293b;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* FILA */
.row {
  display: flex;
  align-items: flex-end;
  margin: 10px 0;
}

/* AVATAR SIEMPRE VISIBLE */
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  margin-right: 8px;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.2s ease;
}

/* BURBUJAS */
.msg {
  padding: 12px 14px;
  border-radius: 12px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.4;
}

/* USER */
.userRow {
  justify-content: flex-end;
}

.user {
  background: #22c55e;
  color: black;
}

/* BOT */
.bot {
  background: #1e293b;
  color: #e2e8f0;
}

/* INPUT */
#inputArea {
  display: flex;
  border-top: 1px solid #1e293b;
}

#input {
  flex: 1;
  padding: 12px;
  border: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 0 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

const messages = document.getElementById("messages");

// MENSAJE USUARIO
function addUserMessage(text) {
  const row = document.createElement("div");
  row.className = "row userRow";

  const msg = document.createElement("div");
  msg.className = "msg user";
  msg.textContent = text;

  row.appendChild(msg);
  messages.appendChild(row);
  messages.scrollTop = 99999;
}

// MENSAJE BOT (CON AVATAR SIEMPRE VISIBLE)
function createBotMessage() {
  const row = document.createElement("div");
  row.className = "row";

  const avatarBox = document.createElement("div");
  avatarBox.className = "avatar";

  const video = document.createElement("video");
  video.src = "idle.mp4";
  video.autoplay = true;
  video.muted = true;
  video.loop = true;

  avatarBox.appendChild(video);

  const msg = document.createElement("div");
  msg.className = "msg bot";

  row.appendChild(avatarBox);
  row.appendChild(msg);

  messages.appendChild(row);
  messages.scrollTop = 99999;

  return { msg, video };
}

// ENVIAR MENSAJE
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addUserMessage(text);
  input.value = "";

  const { msg, video } = createBotMessage();

  // 🟢 CAMBIO SUAVE A HABLANDO
  video.style.opacity = 0.6;
  setTimeout(() => {
    video.src = "talking.mp4";
    video.style.opacity = 1;
  }, 150);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, userId })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    full += chunk;
    msg.textContent = full;
  }

  // 🔵 REGRESO SUAVE A IDLE
  setTimeout(() => {
    video.style.opacity = 0.6;
    setTimeout(() => {
      video.src = "idle.mp4";
      video.style.opacity = 1;
    }, 200);
  }, 1000);
}

// EVENTOS
document.getElementById("sendBtn").onclick = sendMessage;

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// TOGGLE CHAT
document.getElementById("openChat").onclick = () => {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "flex" : "none";
};
</script>

</body>
</html>
