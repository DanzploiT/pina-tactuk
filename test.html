<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
}

/* BOTÓN */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  border: none;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 420px;
  height: 580px;
  background: #020617;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* HEADER */
#header {
  padding: 12px;
  color: #22c55e;
  border-bottom: 1px solid #1e293b;
}

/* AVATAR FIJO */
#avatarContainer {
  display: flex;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #1e293b;
}

#avatar {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  object-fit: cover;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* BURBUJAS */
.msg {
  margin: 8px 0;
  padding: 12px;
  border-radius: 12px;
  max-width: 75%;
  font-size: 14px;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

/* INPUT */
#inputArea {
  display: flex;
  border-top: 1px solid #1e293b;
}

#input {
  flex: 1;
  padding: 12px;
  border: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 0 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>

  <!-- AVATAR FIJO -->
  <div id="avatarContainer">
    <video id="avatar" autoplay muted loop>
      <source src="idle.mp4" type="video/mp4">
    </video>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

const avatar = document.getElementById("avatar");

// MENSAJES
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 99999;
}

// ENVIAR
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  document.getElementById("messages").appendChild(botMsg);

  // 🟢 EMPIEZA A HABLAR
  avatar.src = "talking.mp4";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, userId })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    full += chunk;
    botMsg.textContent = full;
  }

  // 🔵 VUELVE A IDLE SUAVE
  setTimeout(() => {
    avatar.src = "idle.mp4";
  }, 1000);
}

// EVENTOS
document.getElementById("sendBtn").onclick = sendMessage;

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// toggle
document.getElementById("openChat").onclick = () => {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "flex" : "none";
};
</script>

</body>
</html>
