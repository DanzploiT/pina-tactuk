<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1b1f1d;
  color: white;
}

/* LOGIN */
#loginBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #2d3a2e;
  padding: 20px;
  border-radius: 10px;
}

input {
  display: block;
  margin: 10px 0;
  padding: 8px;
  width: 200px;
}

button {
  padding: 10px;
  background: #3a5a40;
  color: white;
  border: none;
  cursor: pointer;
}

/* CHAT */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
}

#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 380px;
  height: 500px;
  background: #2d3a2e;
  display: none;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
}

.user {
  background: #588157;
  text-align: right;
}

.bot {
  background: #dad7cd;
  color: black;
}

</style>
</head>

<body>

<div id="loginBox">
  <h3>Login</h3>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="messages"></div>
  <input id="input" placeholder="Escribe...">
  <button onclick="sendMessage()">Enviar</button>
</div>

<script>
let username = localStorage.getItem("user");

if (username) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("openChat").style.display = "block";
}

async function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: user, password: pass })
  });

  if (!res.ok) return alert("Error login");

  localStorage.setItem("user", user);
  location.reload();
}

document.getElementById("openChat").onclick = () => {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
};

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const bot = document.createElement("div");
  bot.className = "msg bot";
  bot.textContent = "Peña está escribiendo...";
  document.getElementById("messages").appendChild(bot);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, username })
  });

  bot.textContent = "";

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    bot.textContent += decoder.decode(value);
  }
}
</script>

</body>
</html>
