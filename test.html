<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Piña Tactuk 🍍</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #343541;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      max-width: 600px;
      margin: 10px auto;
      padding: 12px 16px;
      border-radius: 10px;
    }

    .user {
      background: #444654;
      text-align: right;
    }

    .bot {
      background: #3b3c4a;
      text-align: left;
    }

    #inputArea {
      display: flex;
      padding: 15px;
      background: #40414f;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #19c37d;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #17a96b;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe un mensaje..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <script>
    const chat = document.getElementById("chat");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "message " + sender;
      div.textContent = text;
      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value;

      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      addMessage("Piña está pensando... 🍍", "bot");

      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      // reemplazar "pensando..."
      chat.lastChild.textContent = data.reply;
    }

    // Enter para enviar
    document.getElementById("input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
