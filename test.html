<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
}

/* LOGIN */
#loginBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

#loginBox h2 {
  color: white;
  text-align: center;
}

#loginBox input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #334155;
  color: white;
}

#loginBox button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* BOTÓN CHAT */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  color: black;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 400px;
  height: 550px;
  background: #020617;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
  animation: fadeIn 0.3s ease;
}

/* HEADER */
#header {
  background: #020617;
  padding: 15px;
  color: #22c55e;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* BURBUJAS */
.msg {
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 80%;
  line-height: 1.4;
  font-size: 14px;
  animation: fadeIn 0.2s ease;
}

/* USUARIO */
.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

/* IA */
.bot {
  background: #1e293b;
  color: #e2e8f0;
  margin-right: auto;
}

/* INPUT */
#inputArea {
  display: flex;
  border-top: 1px solid #1e293b;
}

#input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 0 20px;
  cursor: pointer;
}

/* SCROLL BONITO */
#messages::-webkit-scrollbar {
  width: 6px;
}

#messages::-webkit-scrollbar-thumb {
  background: #22c55e;
  border-radius: 10px;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Peña Tactuk 🪖</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<!-- BOTÓN -->
<button id="openChat">💬</button>

<!-- CHAT -->
<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe un mensaje...">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let username = localStorage.getItem("user");

// Mostrar chat si está logueado
if (username) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("openChat").style.display = "block";
}

// LOGIN
async function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: user, password: pass })
  });

  if (!res.ok) return alert("Error en login");

  localStorage.setItem("user", user);
  location.reload();
}

// Abrir chat
document.getElementById("openChat").onclick = () => {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
};

// Agregar mensaje
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 999999;
  return div;
}

// Enviar mensaje
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botMsg = addMessage("Peña está escribiendo...", "bot");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, username })
  });

  botMsg.textContent = "";

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    botMsg.textContent += decoder.decode(value);
  }
}

// ENTER para enviar
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
