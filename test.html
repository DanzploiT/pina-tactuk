<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
}

/* BOTÓN */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  border: none;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 420px;
  height: 580px;
  background: #020617;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* HEADER */
#header {
  padding: 12px;
  color: #22c55e;
  border-bottom: 1px solid #1e293b;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* FILA BOT */
.botRow {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

/* AVATAR */
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  object-fit: cover;
  transition: opacity 0.5s ease;
}

/* BURBUJAS */
.msg {
  margin: 8px 0;
  padding: 12px;
  border-radius: 12px;
  max-width: 75%;
  font-size: 14px;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

/* INPUT */
#inputArea {
  display: flex;
  border-top: 1px solid #1e293b;
}

#input {
  flex: 1;
  padding: 12px;
  border: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 0 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

// MENSAJE USUARIO
function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = 99999;
}

// MENSAJE BOT CON AVATAR
function createBotMessage() {
  const row = document.createElement("div");
  row.className = "botRow";

  const avatar = document.createElement("video");
  avatar.className = "avatar";
  avatar.src = "idle.mp4";
  avatar.muted = true;
  avatar.loop = true;
  avatar.play();

  const msg = document.createElement("div");
  msg.className = "msg bot";

  row.appendChild(avatar);
  row.appendChild(msg);
  messages.appendChild(row);

  messages.scrollTop = 99999;

  return { msg, avatar };
}

// ENVIAR
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addUserMessage(text);
  input.value = "";

  const { msg, avatar } = createBotMessage();

  // 🔥 cambia a talking
  avatar.src = "talking.mp4";
  avatar.play();

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, userId })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    full += chunk;
    msg.textContent = full;
  }

  // 🟢 se queda hablando un poco más
  setTimeout(() => {
    avatar.style.opacity = 0;

    setTimeout(() => {
      avatar.src = "idle.mp4";
      avatar.play();
      avatar.style.opacity = 1;
    }, 400);

  }, 2500); // ⬅️ ajusta este tiempo si quieres más duración
}

// EVENTOS
sendBtn.onclick = sendMessage;

input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

openChat.onclick = () => {
  chatBox.style.display =
    chatBox.style.display === "none" ? "flex" : "none";
};
</script>

</body>
</html>
