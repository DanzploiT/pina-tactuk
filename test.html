<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk</title>

<style>
body { margin:0; font-family: Arial; }

#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #10a37f;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 360px;
  height: 520px;
  background: #343541;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#header {
  padding: 10px;
  background: #202123;
  font-weight: bold;
}

#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  max-width: 80%;
}

.user { background: #10a37f; align-self: flex-end; }
.bot { background: #444654; align-self: flex-start; }

#inputArea {
  display: flex;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  background: #10a37f;
  border: none;
  color: white;
}
</style>
</head>

<body>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🇩🇴</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
const chatBox = document.getElementById("chatBox");
const openBtn = document.getElementById("openChat");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");

// 🧠 sesión única
const sessionId = localStorage.getItem("sessionId") || crypto.randomUUID();
localStorage.setItem("sessionId", sessionId);

// abrir chat
openBtn.onclick = () => {
  chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
};

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return div;
}

// 🚀 STREAMING REAL
async function sendMessage() {
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botDiv = addMessage("...", "bot");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text,
      sessionId
    })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  botDiv.textContent = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    botDiv.textContent += chunk;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
}
</script>

</body>
</html>
