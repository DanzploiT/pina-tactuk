<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #0f172a;
}

/* SIDEBAR */
#sidebar {
  width: 250px;
  background: #020617;
  color: white;
  height: 100vh;
  padding: 10px;
  box-sizing: border-box;
}

#sidebar button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  margin-bottom: 10px;
}

.chatItem {
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}
.chatItem:hover {
  background: #1e293b;
}

/* CHAT */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

#inputArea {
  display: flex;
}

#input {
  flex: 1;
  padding: 10px;
}

#send {
  padding: 10px;
  background: #22c55e;
  border: none;
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ Nuevo chat</button>
  <div id="chatList"></div>
</div>

<div id="chat">
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="send">Enviar</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("user");
if (!userId) {
  userId = prompt("Pon tu usuario:");
  localStorage.setItem("user", userId);
}

let currentChat = null;

// 🆕 NUEVO CHAT
async function newChat() {
  const res = await fetch("/new-chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId })
  });

  const chat = await res.json();
  currentChat = chat._id;

  document.getElementById("messages").innerHTML = "";
  loadChats();
}

// 📋 LISTA
async function loadChats() {
  const res = await fetch("/chats/" + userId);
  const chats = await res.json();

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chatItem";
    div.textContent = c.title;
    div.onclick = () => loadChat(c);
    list.appendChild(div);
  });
}

// 📂 CARGAR CHAT
function loadChat(chat) {
  currentChat = chat._id;

  const box = document.getElementById("messages");
  box.innerHTML = "";

  chat.messages.forEach(m => {
    if (m.role !== "system") {
      addMessage(m.content, m.role === "user" ? "user" : "bot");
    }
  });
}

// ➕ MENSAJE
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  return div;
}

// 💬 ENVIAR
document.getElementById("send").onclick = sendMessage;
document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text || !currentChat) return;

  addMessage(text, "user");
  input.value = "";

  const botMsg = addMessage("...", "bot");

  const res = await fetch("/chat/" + currentChat, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  botMsg.textContent = "";

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    botMsg.textContent += decoder.decode(value);
  }

  loadChats();
}

// INIT
loadChats();
</script>

</body>
</html>
