<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Piña Tactuk 🍍</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* BOTÓN FLOTANTE */
  #chatButton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #19c37d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* VENTANA CHAT */
  #chatWindow {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: #343541;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;

    /* 🔥 ANIMACIÓN */
    transform: scale(0);
    opacity: 0;
    transform-origin: bottom right;
    transition: all 0.25s ease;
  }

  /* ESTADO ACTIVO */
  #chatWindow.active {
    transform: scale(1);
    opacity: 1;
  }

  /* HEADER */
  #chatHeader {
    background: #202123;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    color: white;
  }

  #chatHeader button {
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    padding: 2px 8px;
  }

  /* MENSAJES */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    color: white;
  }

  .message {
    margin: 6px 0;
    padding: 8px;
    border-radius: 6px;
    max-width: 80%;
  }

  .user {
    background: #19c37d;
    align-self: flex-end;
    margin-left: auto;
  }

  .bot {
    background: #444654;
  }

  /* INPUT */
  #inputArea {
    display: flex;
    padding: 8px;
    background: #40414f;
  }

  #input {
    flex: 1;
    padding: 6px;
    border: none;
    outline: none;
  }

  #sendBtn {
    margin-left: 5px;
    padding: 6px 10px;
    border: none;
    background: #19c37d;
    color: white;
  }
</style>
</head>

<body>

<!-- BOTÓN -->
<button id="chatButton" onclick="toggleChat()">🍍</button>

<!-- CHAT -->
<div id="chatWindow">

  <div id="chatHeader">
    <span>Piña Tactuk</span>
    <button onclick="toggleChat()">X</button>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe..." />
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const chatWindow = document.getElementById("chatWindow");

function toggleChat() {
  chatWindow.classList.toggle("active");
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const botDiv = document.createElement("div");
  botDiv.className = "message bot";
  botDiv.textContent = "Piña está escribiendo... 🍍";
  chat.appendChild(botDiv);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  botDiv.textContent = data.reply;
}

// Enter para enviar
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
