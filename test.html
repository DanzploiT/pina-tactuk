<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Piña Tactuk 🍍</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* BOTÓN FLOTANTE */
  #chatButton {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #19c37d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    cursor: pointer;
  }

  /* VENTANA CHAT */
  #chatWindow {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 300px;
    height: 400px;
    background: #343541;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  #chatHeader {
    background: #202123;
    padding: 10px;
    display: flex;
    justify-content: space-between;
  }

  #chatHeader button {
    background: red;
    border: none;
    color: white;
    cursor: pointer;
  }

  /* MENSAJES */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    color: white;
  }

  .message {
    margin: 5px 0;
    padding: 8px;
    border-radius: 5px;
  }

  .user {
    background: #444654;
    text-align: right;
  }

  .bot {
    background: #3b3c4a;
  }

  /* INPUT */
  #inputArea {
    display: flex;
    padding: 5px;
    background: #40414f;
  }

  #input {
    flex: 1;
    padding: 5px;
    border: none;
  }

  button {
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- BOTÓN -->
<button id="chatButton" onclick="toggleChat()">🍍</button>

<!-- VENTANA -->
<div id="chatWindow">

  <div id="chatHeader">
    <span>Piña Tactuk</span>
    <button onclick="toggleChat()">X</button>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");

function toggleChat() {
  const window = document.getElementById("chatWindow");
  window.style.display = window.style.display === "flex" ? "none" : "flex";
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  addMessage("Piña está escribiendo... 🍍", "bot");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.lastChild.textContent = data.reply;
}

// Enter
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
