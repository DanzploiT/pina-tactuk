<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  display: flex;
}

/* SIDEBAR */
#sidebar {
  width: 250px;
  background: #020617;
  padding: 15px;
  border-right: 1px solid #1e293b;
}

#newChat {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* CHAT */
#main {
  flex: 1;
  position: relative;
}

/* BOTÓN */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  border: none;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

/* CHAT BOX */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 400px;
  height: 550px;
  background: #020617;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
#header {
  padding: 10px;
  color: #22c55e;
  border-bottom: 1px solid #1e293b;
}

/* AVATAR */
#avatarContainer {
  text-align: center;
  padding: 5px;
  border-bottom: 1px solid #1e293b;
}

#avatar {
  width: 120px;
  border-radius: 10px;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* BURBUJAS */
.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

/* INPUT */
#inputArea {
  display: flex;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <button id="newChat">+ Nuevo chat</button>
</div>

<!-- MAIN -->
<div id="main">

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>

  <!-- AVATAR -->
  <div id="avatarContainer">
    <video id="avatar" autoplay muted loop>
      <source src="idle.mp4" type="video/mp4">
    </video>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="sendBtn">➤</button>
  </div>
</div>

</div>

<script>
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

const avatar = document.getElementById("avatar");

// NUEVO CHAT
document.getElementById("newChat").onclick = () => {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
  document.getElementById("messages").innerHTML = "";
};

// ABRIR CHAT
document.getElementById("openChat").onclick = () => {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "flex" : "none";
};

// MENSAJES
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 99999;
  return div;
}

// ENVIAR
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botMsg = addMessage("", "bot");

  // 🟢 CAMBIAR A HABLANDO
  avatar.src = "talking.mp4";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: text,
      userId
    })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    full += chunk;
    botMsg.textContent = full;
  }

  // 🔵 VOLVER A IDLE
  avatar.src = "idle.mp4";
}

// ENTER
document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

document.getElementById("sendBtn").onclick = sendMessage;
</script>

</body>
</html>
