<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
}

/* BOTÓN FLOTANTE */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  color: black;
  border: none;
  padding: 16px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 380px;
  height: 520px;
  background: #020617;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  box-shadow: 0 0 25px rgba(0,0,0,0.8);
  overflow: hidden;
}

/* HEADER */
#header {
  padding: 15px;
  color: #22c55e;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* BURBUJAS */
.msg {
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
  font-size: 14px;
  line-height: 1.4;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: #e2e8f0;
}

/* INPUT */
#inputArea {
  display: flex;
  border-top: 1px solid #1e293b;
}

#input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: white;
}

#sendBtn {
  background: #22c55e;
  border: none;
  padding: 0 20px;
  cursor: pointer;
}

/* SCROLL */
#messages::-webkit-scrollbar {
  width: 6px;
}
#messages::-webkit-scrollbar-thumb {
  background: #22c55e;
  border-radius: 10px;
}
</style>
</head>

<body>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🪖</div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe un mensaje...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const openBtn = document.getElementById("openChat");
const chatBox = document.getElementById("chatBox");
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

// USER ID (IMPORTANTE)
let userId = localStorage.getItem("user") || "default_user";
localStorage.setItem("user", userId);

// abrir/cerrar chat
openBtn.onclick = () => {
  chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
};

// agregar mensaje
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

// enviar mensaje
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botMsg = addMessage("...", "bot");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: text,
      userId: userId
    })
  });

  botMsg.textContent = "";

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    botMsg.textContent += decoder.decode(value);
  }
}

// eventos
sendBtn.onclick = sendMessage;

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
