<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#1b1f1b;
}

/* BOTON */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3b5323;
  color: #c2b280;
  border: none;
  padding: 18px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}

/* CHAT */
#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 420px;
  height: 620px;
  background: #2b2f2b;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  border: 2px solid #3b5323;
}

/* HEADER */
#header {
  background: #3b5323;
  color: #c2b280;
  padding: 12px;
  font-weight: bold;
  text-align: center;
}

/* MENSAJES */
#messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  max-width:80%;
}

.user {
  background:#556b2f;
  align-self:flex-end;
}

.bot {
  background:#3a3f3a;
  align-self:flex-start;
}

/* INPUT */
#inputArea {
  display:flex;
  border-top:1px solid #444;
}

#input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:#1b1f1b;
  color:white;
}

button {
  background:#3b5323;
  color:#c2b280;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* LOGIN */
#loginBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #2b2f2b;
  padding: 30px;
  border-radius: 10px;
  border:2px solid #3b5323;
}

input.login {
  display:block;
  margin:10px 0;
  padding:10px;
  width:200px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3 style="color:#c2b280;">Acceso Militar</h3>
  <input id="user" class="login" placeholder="Usuario">
  <input id="pass" class="login" placeholder="Contraseña" type="password">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrar</button>
</div>

<button id="openChat">💬</button>

<div id="chatBox">
  <div id="header">Peña Tactuk 🇩🇴</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Ordene..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
const sessionId = localStorage.getItem("sessionId") || crypto.randomUUID();
localStorage.setItem("sessionId", sessionId);

const chatBox = document.getElementById("chatBox");
const openBtn = document.getElementById("openChat");
const messagesDiv = document.getElementById("messages");

openBtn.onclick = () => {
  chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
};

// LOGIN
async function login() {
  const username = user.value;
  const password = pass.value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    loginBox.style.display = "none";
  } else {
    alert("Acceso denegado");
  }
}

async function register() {
  const username = user.value;
  const password = pass.value;

  await fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username, password })
  });

  alert("Registrado");
}

// CHAT
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const botDiv = addMessage("...", "bot");

  const res = await fetch("/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: text, sessionId })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  botDiv.textContent = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    botDiv.textContent += decoder.decode(value);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
}
</script>

</body>
</html>
