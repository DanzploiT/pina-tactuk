<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Peña Tactuk 🪖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
}

/* LOGIN */
#login {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1e293b;
  padding: 25px;
  border-radius: 10px;
  width: 260px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* BOTÓN */
#openChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  border-radius: 50%;
  padding: 15px;
  cursor: pointer;
  display: none;
}

/* CHAT */
#chat {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 380px;
  height: 550px;
  background: #020617;
  border-radius: 12px;
  display: none;
  flex-direction: column;
}

/* HEADER */
#header {
  padding: 12px;
  color: #22c55e;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* BURBUJAS */
.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #22c55e;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  color: white;
}

/* INPUT */
#inputArea {
  display: flex;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
}

#send {
  background: #22c55e;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3 style="color:white">Peña Tactuk 🪖</h3>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<!-- BOTÓN -->
<div id="openChat">💬</div>

<!-- CHAT -->
<div id="chat">
  <div id="header">Peña Tactuk 🪖</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe...">
    <button id="send" onclick="send()">➤</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("user");

// mostrar chat si ya logueado
if (userId) {
  document.getElementById("login").style.display = "none";
  document.getElementById("openChat").style.display = "block";
}

// login
async function login() {
  const u = user.value;
  const p = pass.value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: u, password: p })
  });

  if (!res.ok) return alert("Error");

  localStorage.setItem("user", u);
  location.reload();
}

// abrir chat
openChat.onclick = () => {
  chat.style.display = chat.style.display === "flex" ? "none" : "flex";
};

// agregar mensaje
function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = 9999;
  return div;
}

// enviar mensaje
async function send() {
  const text = input.value;
  if (!text) return;

  add(text, "user");
  input.value = "";

  const bot = add("...", "bot");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, userId })
  });

  bot.textContent = "";

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    bot.textContent += decoder.decode(value);
  }
}

// enter enviar
input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
